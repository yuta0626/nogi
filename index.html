<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>生写真管理</title>
<style>
  body { font-family: sans-serif; padding: 20px; }

  /* 右上に戻るボタン */
  #undoBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    padding: 8px 12px;
    z-index: 999;
  }

  table { border-collapse: collapse; width: 100%; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 6px; }

  /* 乃木坂カラーのヘッダー */
  thead th {
    background-color: #7b4ca5;
    color: white;
    text-shadow: 0 0 3px black;
    padding: 10px 6px;
  }

  .header-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  /* 列幅最適化（iPhone対応） */
  th, td { width: 60px; } /* ← 種類列を超コンパクト化 */

  /* メンバー列は広め（吉田綾乃クリスティー対策） */
  #memberHeader,
  td.name-cell {
    width: 160px;
    white-space: nowrap;
  }

  /* ロック列のチェックを完全中央寄せ */
  .lock-cell {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* 種類列のチェック＋数字を1行に収める */
  .center-cell {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2px;          /* ← 超コンパクト */
    white-space: nowrap;
  }

  /* 数字欄をさらにコンパクト化（iPhone対応） */
  input[type="number"] {
    width: 42px;       /* ← iPhoneでも折り返さない幅 */
    background-color: rgba(255,255,255,0.85);
    border: 1px solid #ccc;
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 16px;
  }

  td.delete-cell { text-align: center; }

  .bg-3rd { background-color: #cceeff; }
  .bg-4th { background-color: #ffddaa; }
  .bg-5th { background-color: #ffd6e7; }
  .bg-6th { background-color: #ccf5cc; }

  .favorite {
    cursor: pointer;
    font-size: 16px;
    margin-right: 6px;
  }
  .favorite.checked {
    color: gold;
    text-shadow: -1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;
  }

  .tab-area { margin-bottom: 20px; }
  .tab {
    display: inline-block;
    padding: 8px 12px;
    margin-right: 5px;
    border: 1px solid #aaa;
    background: #eee;
    cursor: pointer;
  }
  .tab.active { background: #ddd; font-weight: bold; }

  .setting-box {
    margin-bottom: 20px;
    padding: 10px;
    border: 1px solid #aaa;
    background: #f9f9f9;
  }

  .flex-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .header-btn {
    padding: 3px 6px;
    font-size: 12px;
    width: 110px;
    white-space: nowrap;
  }

  #tableBody tr:nth-child(even) td:not(.name-cell) {
    background-color: rgba(0,0,0,0.05);
  }
</style>
</head>
<body>

<button id="undoBtn">⟲ 1つ戻る</button>

<h2>生写真管理</h2>

<div class="tab-area" id="tabArea"></div>
<button id="addListBtn">＋ 新規リスト</button>
<button id="deleteTabBtn">タブ削除</button>

<div class="setting-box">
  <h3>タブ名編集</h3>
  <input type="text" id="editTabName">
  <button id="saveTabNameBtn">変更</button>
</div>

<div class="setting-box flex-row">
  <div>
    <h3>種類</h3>
    <label><input type="radio" name="typeCount" value="3">3種</label><br>
    <label><input type="radio" name="typeCount" value="4">4種</label><br>
    <label><input type="radio" name="typeCount" value="5">5種</label>
  </div>

  <div>
    <h3>種類名</h3>
    <div id="typeNameInputs"></div>
  </div>
</div>

<table>
  <thead>
    <tr id="headerRow"></tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
const defaultMembers={
  3:["伊藤理々杏","岩本蓮加","吉田綾乃クリスティー"],
  4:["遠藤さくら","賀喜遥香","金川紗耶","黒見明香","柴田柚菜","田村真佑","筒井あやめ","林瑠奈","弓木奈於"],
  5:["五百城茉央","池田瑛紗","一ノ瀬美空","井上和","岡本姫奈","小川彩","奥田いろは","川﨑桜","菅原咲月","冨里奈央","中西アルノ"],
  6:["愛宕心響","大越ひなの","小津玲奈","海邉朱莉","川端晃菜","鈴木佑捺","瀬戸口心月","長嶋凛桜","増田三莉音","森平麗心","矢田萌華"]
};

const genColor={3:"bg-3rd",4:"bg-4th",5:"bg-5th",6:"bg-6th"};

let lists=JSON.parse(localStorage.getItem("nogiLists"))||[
  {name:"通常",typeCount:3,typeNames:["A","B","C"],members:JSON.parse(JSON.stringify(defaultMembers)),data:{},favFilterMode:0}
];
let currentListIndex=0;

function backupData(){localStorage.setItem("nogiLists_backup",JSON.stringify(lists));}
function saveData(){localStorage.setItem("nogiLists",JSON.stringify(lists));}

document.getElementById("undoBtn").onclick=()=>{
  const b=localStorage.getItem("nogiLists_backup");
  if(b){lists=JSON.parse(b);saveData();renderAll();}
};

function renderTabs(){
  const area=document.getElementById("tabArea");
  area.innerHTML="";
  lists.forEach((list,i)=>{
    const tab=document.createElement("div");
    tab.className="tab"+(i===currentListIndex?" active":"");
    tab.textContent=list.name;
    tab.onclick=()=>{currentListIndex=i;renderAll();};
    area.appendChild(tab);
  });
}

document.getElementById("saveTabNameBtn").onclick=()=>{
  backupData();
  lists[currentListIndex].name=document.getElementById("editTabName").value;
  saveData();renderAll();
};

document.getElementById("deleteTabBtn").onclick=()=>{
  if(lists.length<=1)return;
  backupData();
  lists.splice(currentListIndex,1);
  currentListIndex=Math.max(0,currentListIndex-1);
  saveData();renderAll();
};

document.getElementById("addListBtn").onclick=()=>{
  backupData();
  lists.push({name:"新規リスト",typeCount:3,typeNames:["A","B","C"],members:JSON.parse(JSON.stringify(defaultMembers)),data:{},favFilterMode:0});
  currentListIndex=lists.length-1;
  saveData();renderAll();
};

function renderTypeNameInputs(){
  const box=document.getElementById("typeNameInputs");
  box.innerHTML="";
  const list=lists[currentListIndex];
  for(let i=0;i<list.typeCount;i++){
    const div=document.createElement("div");
    div.innerHTML=`${i+1}種名：<input type="text" value="${list.typeNames[i]}" data-i="${i}">`;
    box.appendChild(div);
  }
  box.querySelectorAll("input").forEach(inp=>{
    inp.oninput=()=>{
      backupData();
      lists[currentListIndex].typeNames[inp.dataset.i]=inp.value;
      saveData();renderTable();
    };
  });
}

document.querySelectorAll("input[name='typeCount']").forEach(r=>{
  r.onchange=()=>{
    backupData();
    const list=lists[currentListIndex];
    list.typeCount=Number(r.value);
    while(list.typeNames.length<list.typeCount)list.typeNames.push("新種");
    saveData();renderAll();
  };
});

function renderHeader(){
  const header=document.getElementById("headerRow");
  header.innerHTML="";

  const thLock=document.createElement("th");
  thLock.innerHTML=`
    <div class="header-cell">
      ロック
      <button id="bulkLockBtn" class="header-btn"></button>
    </div>`;
  header.appendChild(thLock);

  const thMember=document.createElement("th");
  thMember.id="memberHeader";
  thMember.innerHTML=`
    <div class="header-cell">
      メンバー
      <button id="favFilterBtn" class="header-btn"></button>
    </div>`;
  header.appendChild(thMember);

  const list=lists[currentListIndex];

  const bulk=document.getElementById("bulkLockBtn");
  const allLocked=Object.values(list.data).every(d=>d.lock);
  bulk.textContent=allLocked?"全て解除":"全てロック";
  bulk.onclick=()=>{
    backupData();
    const newState=!allLocked;
    Object.keys(list.data).forEach(n=>list.data[n].lock=newState);
    saveData();renderTable();
  };

  const favBtn=document.getElementById("favFilterBtn");
  const mode=list.favFilterMode;
  favBtn.textContent=mode===0?"全メンバー":mode===1?"お気に入り":"お気に入り以外";
  favBtn.onclick=()=>{
    backupData();
    list.favFilterMode=(list.favFilterMode+1)%3;
    saveData();renderTable();
  };

  for(let i=0;i<list.typeCount;i++){
    const th=document.createElement("th");
    th.textContent=list.typeNames[i];
    header.appendChild(th);
  }

  const thDel=document.createElement("th");
  thDel.textContent="削除";
  header.appendChild(thDel);
}

function createRow(name,gen){
  const list=lists[currentListIndex];
  if(!list.data[name])list.data[name]={favorite:false,lock:false,items:[]};

  const mode=list.favFilterMode;
  if(mode===1&&!list.data[name].favorite)return null;
  if(mode===2&&list.data[name].favorite)return null;

  const tr=document.createElement("tr");

  const tdLock=document.createElement("td");
  tdLock.className="lock-cell";
  const lock=document.createElement("input");
  lock.type="checkbox";
  lock.checked=list.data[name].lock;
  lock.onchange=()=>{
    backupData();
    list.data[name].lock=lock.checked;
    saveData();renderTable();
  };
  tdLock.appendChild(lock);
  tr.appendChild(tdLock);

  const tdName=document.createElement("td");
  tdName.className="name-cell "+genColor[gen];
  const fav=document.createElement("span");
  fav.textContent="★";
  fav.className="favorite"+(list.data[name].favorite?" checked":"");
  fav.onclick=()=>{
    if(list.data[name].lock)return;
    backupData();
    list.data[name].favorite=!list.data[name].favorite;
    saveData();renderTable();
  };
  tdName.appendChild(fav);
  tdName.appendChild(document.createTextNode(name));
  tr.appendChild(tdName);

  for(let i=0;i<list.typeCount;i++){
    if(!list.data[name].items[i])list.data[name].items[i]={checked:false,count:""};
    const td=document.createElement("td");
    td.className="center-cell";

    const cb=document.createElement("input");
    cb.type="checkbox";
    cb.checked=list.data[name].items[i].checked;

    const num=document.createElement("input");
    num.type="number";
    num.min=0;
    num.value=list.data[name].items[i].count;

    cb.onchange=()=>{
      if(list.data[name].lock){cb.checked=list.data[name].items[i].checked;return;}
      backupData();
      list.data[name].items[i].checked=cb.checked;
      num.disabled=!cb.checked;
      if(!cb.checked){num.value="";list.data[name].items[i].count="";}
      saveData();
    };

    num.oninput=()=>{
      if(list.data[name].lock){num.value=list.data[name].items[i].count;return;}
      backupData();
      list.data[name].items[i].count=num.value;
      saveData();
    };

    td.appendChild(cb);
    td.appendChild(num);
    tr.appendChild(td);
  }

  const tdDel=document.createElement("td");
  tdDel.className="delete-cell";
  const del=document.createElement("button");
  del.textContent="削除";
  del.onclick=()=>{
    if(list.data[name].lock)return;
    backupData();
    list.members[gen]=list.members[gen].filter(m=>m!==name);
    delete list.data[name];
    saveData();renderAll();
  };
  tdDel.appendChild(del);
  tr.appendChild(tdDel);

  return tr;
}

function renderTable(){
  renderHeader();
  const body=document.getElementById("tableBody");
  body.innerHTML="";
  const list=lists[currentListIndex];

  Object.keys(list.members).forEach(gen=>{
    list.members[gen].forEach(name=>{
      const row=createRow(name,Number(gen));
      if(row)body.appendChild(row);
    });
  });
}

function renderAll(){
  renderTabs();
  document.getElementById("editTabName").value=lists[currentListIndex].name;

  const list=lists[currentListIndex];
  document.querySelectorAll("input[name='typeCount']").forEach(r=>{
    r.checked=Number(r.value)===list.typeCount;
  });

  renderTypeNameInputs();
  renderTable();
}

renderAll();
</script>

</body>
</html>
