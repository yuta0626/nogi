<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>所持グッズ管理（乃木坂3〜6期生）</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  table { border-collapse: collapse; width: 100%; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }

  /* 期別背景色 */
  .bg-3rd { background-color: #cceeff; }
  .bg-4th { background-color: #ffddaa; }
  .bg-5th { background-color: #ffd6e7; }
  .bg-6th { background-color: #ccf5cc; }

  .setting-box {
    margin-bottom: 20px;
    padding: 10px;
    border: 1px solid #aaa;
    background: #f9f9f9;
  }
</style>
</head>
<body>

<h2>所持グッズ管理（乃木坂3〜6期生）</h2>

<!-- 種類数設定 -->
<div class="setting-box">
  <h3>種類数の設定</h3>
  <label><input type="radio" name="typeCount" value="3" checked> 3種</label>
  <label><input type="radio" name="typeCount" value="4"> 4種</label>
  <label><input type="radio" name="typeCount" value="5"> 5種</label>
</div>

<!-- 種類名設定 -->
<div class="setting-box">
  <h3>種類名の設定</h3>
  <div id="typeNameInputs"></div>
</div>

<table id="goodsTable">
  <thead>
    <tr id="headerRow">
      <th>人物名</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
// 3期生
const members3 = [
  "伊藤理々杏",
  "岩本蓮加",
  "吉田綾乃クリスティー"
];

// 4期生
const members4 = [
  "遠藤さくら",
  "賀喜遥香",
  "金川紗耶",
  "黒見明香",
  "柴田柚菜",
  "田村真佑",
  "筒井あやめ",
  "林瑠奈",
  "弓木奈於"
];

// 5期生
const members5 = [
  "五百城茉央",
  "池田瑛紗",
  "一ノ瀬美空",
  "井上和",
  "岡本姫奈",
  "小川彩",
  "奥田いろは",
  "川﨑桜",
  "菅原咲月",
  "冨里奈央",
  "中西アルノ"
];

// 6期生
const members6 = [
  "愛宕心響",
  "大越ひなの",
  "小津玲奈",
  "海邉朱莉",
  "川端晃菜",
  "鈴木佑捺",
  "瀬戸口心月",
  "長嶋凛桜",
  "増田三莉音",
  "森平麗心",
  "矢田萌華"
];

// 期別背景色マップ
const generationMap = {};
members3.forEach(n => generationMap[n] = "bg-3rd");
members4.forEach(n => generationMap[n] = "bg-4th");
members5.forEach(n => generationMap[n] = "bg-5th");
members6.forEach(n => generationMap[n] = "bg-6th");

// 全メンバー
const people = [...members3, ...members4, ...members5, ...members6];

// 種類名（初期値）
let typeNames = ["A", "B", "C", "D", "E"];

// 種類数
let typeCount = 3;

// 種類名入力欄を生成
function renderTypeNameInputs() {
  const box = document.getElementById("typeNameInputs");
  box.innerHTML = "";

  for (let i = 0; i < typeCount; i++) {
    const div = document.createElement("div");
    div.innerHTML = `${i+1}種名：<input type="text" value="${typeNames[i]}" data-index="${i}">`;
    box.appendChild(div);
  }

  // 入力変更イベント
  box.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", () => {
      const idx = input.dataset.index;
      typeNames[idx] = input.value;
      renderTable();
    });
  });
}

// ヘッダー生成
function renderHeader() {
  const header = document.getElementById("headerRow");
  header.innerHTML = "<th>人物名</th>";

  for (let i = 0; i < typeCount; i++) {
    const th = document.createElement("th");
    th.textContent = typeNames[i];
    header.appendChild(th);
  }
}

// 行生成
function createRow(name) {
  const tr = document.createElement("tr");

  const nameCell = document.createElement("td");
  nameCell.textContent = name;
  nameCell.classList.add(generationMap[name]);
  tr.appendChild(nameCell);

  for (let i = 0; i < typeCount; i++) {
    const td = document.createElement("td");

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";

    const number = document.createElement("input");
    number.type = "number";
    number.min = 0;
    number.style.width = "50px";
    number.disabled = true;

    checkbox.addEventListener("change", () => {
      number.disabled = !checkbox.checked;
      if (!checkbox.checked) number.value = "";
    });

    td.appendChild(checkbox);
    td.appendChild(number);
    tr.appendChild(td);
  }

  return tr;
}

// 表描画
function renderTable() {
  renderHeader();

  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  people.forEach(p => body.appendChild(createRow(p)));
}

// 種類数変更イベント
document.querySelectorAll("input[name='typeCount']").forEach(radio => {
  radio.addEventListener("change", () => {
    typeCount = Number(radio.value);
    renderTypeNameInputs();
    renderTable();
  });
});

// 初期描画
renderTypeNameInputs();
renderTable();
</script>

</body>
</html>
